<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1720;
      --fg: #f4f1ea;
      --muted: #9aa7b5;
      --accent: #d4a574;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      font-family: "Noto Sans KR", sans-serif;
      background:
        linear-gradient(160deg, #15202b 0%, #0f1720 55%, #1a1510 100%);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 88px 80px;
    }
    h1 {
      font-size: 56px;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 36px;
    }
    .body {
      font-size: 36px;
      line-height: 1.5;
      color: var(--muted);
      font-weight: 500;
      max-width: 20ch;
    }
    .footer {
      margin-top: 80px;
      font-size: 22px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>{{headline}}</h1>
  <p class="body">{{body}}</p>
  <p class="footer">{{brand}}</p>
</body>
</html>
