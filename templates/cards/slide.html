<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1720;
      --fg: #f4f1ea;
      --muted: #9aa7b5;
      --accent: #d4a574;
      --line: rgba(244, 241, 234, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 88px 80px;
    }
    .index {
      font-size: 26px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    h1 {
      margin-top: 56px;
      font-size: 64px;
      line-height: 1.25;
      font-weight: 900;
    }
    .divider {
      margin: 40px 0;
      height: 2px;
      background: var(--line);
      width: 120px;
    }
    .body {
      font-size: 40px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      max-width: 18ch;
    }
    .footer {
      font-size: 22px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div>
    <p class="index">{{index}}</p>
    <h1>{{headline}}</h1>
    <div class="divider"></div>
    <p class="body">{{body}}</p>
  </div>
  <p class="footer">{{brand}}</p>
</body>
</html>
