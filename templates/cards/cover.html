<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1720;
      --fg: #f4f1ea;
      --muted: #9aa7b5;
      --accent: #d4a574;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1080px;
      font-family: "Noto Sans KR", sans-serif;
      background:
        radial-gradient(ellipse at 20% 0%, #1a2a3a 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, #243040 0%, transparent 45%),
        var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 88px 80px;
    }
    .eyebrow {
      font-size: 28px;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }
    h1 {
      margin-top: 48px;
      font-size: 84px;
      line-height: 1.15;
      font-weight: 900;
      max-width: 14ch;
    }
    .body {
      margin-top: 36px;
      font-size: 36px;
      color: var(--muted);
      font-weight: 500;
    }
    .footer {
      font-size: 24px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div>
    <p class="eyebrow">DAILY BRIEF</p>
    <h1>{{headline}}</h1>
    <p class="body">{{body}}</p>
  </div>
  <p class="footer">{{brand}}</p>
</body>
</html>
